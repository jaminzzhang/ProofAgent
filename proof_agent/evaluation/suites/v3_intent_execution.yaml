      outcome: WAITING_FOR_APPROVAL
      required_tool_contract_ids:
        - customer_lookup
      max_action_constraint_rewrites: 0
      response_assertions:
        must_include_any:
          - Waiting for approval
        must_not_include:
          - guaranteed approved
        language: en
