    question_match:
      mode: exact_normalized
    intent_type: enterprise_policy_question
    expected_resolution: answer_with_citations
    risk_class: low_business_fact
    capability_path: retrieval_only
    expected:
      outcome: ANSWERED_WITH_CITATIONS
      required_citation_refs:
        - discount-policy
      forbid_clarification: true
      max_action_constraint_rewrites: 0
      forbid_repeated_retrieval_queries: true
      require_response_citation_refs: true
      response_assertions:
        must_include_any:
          - approved customer discount evidence
        must_not_include:
          - guaranteed approved
        language: en

  - case_id: v3_support_boundary_answer
    required_for_release: true
    question: What should support agents do when a question is not supported by retrieved enterprise knowledge?
    question_match:
      mode: exact_normalized
    intent_type: enterprise_policy_question
    expected_resolution: answer_with_citations
    risk_class: low_business_fact
    capability_path: retrieval_only
    expected:
      outcome: ANSWERED_WITH_CITATIONS
      required_citation_refs:
        - customer-support-policy
      forbid_clarification: true
