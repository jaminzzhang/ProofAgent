name: react_enterprise_qa_v3
purpose: "Answer enterprise knowledge questions through the governed Controlled ReAct Loop (ADR-0032): observation actions return to plan under a dual-axis budget and deterministic Convergence Check."

workflow:
  template: react_enterprise_qa_v3
  template_descriptor_version: react_enterprise_qa.v3

package_knowledge_sources:
  - source_id: react_enterprise_qa_v3_knowledge
    name: ReAct Enterprise QA V3 Knowledge
    provider: local_markdown
    params:
      path: ./knowledge

knowledge_bindings:
  - binding_id: react_enterprise_qa_v3_knowledge_binding
    source_ref:
      scope: package
      source_id: react_enterprise_qa_v3_knowledge

retrieval:
  strategy: single_step
  top_k: 2
  min_score: 0.2

react:
  max_plan_rounds: 4
  max_tool_calls: 0
  record_reasoning_summary: true
  planner:
    provider: deterministic
    name: react-planner-demo

review:
  mode: auto
  subagent:
    provider: deterministic
    name: harness-review-demo
    fail_closed: true
    params:
      timeout_seconds: 5
      max_output_tokens: 500

response:
  include_reasoning_summary: false
  include_review_results: false

model:
  provider: deterministic
  name: demo

policy:
  file: ./policy.yaml

capabilities:
  tools:
    enabled: false
  memory:
    enabled: true
    provider: session

audit:
  trace_path: ../../runs/latest/trace.jsonl
  receipt_path: ../../runs/latest/governance_receipt.md
