name: react_enterprise_qa
purpose: "Answer enterprise knowledge questions through a governed ReAct workflow."

workflow:
  runtime: langgraph
  template: react_enterprise_qa
  checkpointer:
    provider: sqlite
    uri: memory

package_knowledge_sources:
  - source_id: react_enterprise_qa_knowledge
    name: ReAct Enterprise QA Knowledge
    provider: local_markdown
    params:
      path: ./knowledge

knowledge_bindings:
  - binding_id: react_enterprise_qa_knowledge_binding
    source_ref:
      scope: package
      source_id: react_enterprise_qa_knowledge

retrieval:
  strategy: single_step
  top_k: 2
  min_score: 0.2

react:
  max_steps: 5
  max_tool_calls: 1
  record_reasoning_summary: true
  planner:
    provider: deterministic
    name: react-planner-demo

review:
  mode: auto
  subagent:
    provider: deterministic
    name: harness-review-demo
    fail_closed: true
    params:
      timeout_seconds: 5
      max_output_tokens: 500

response:
  include_reasoning_summary: false
  include_review_results: false

model:
  provider: deterministic
  name: demo

policy:
  file: ./policy.yaml

tools:
  file: ./tools.yaml

memory:
  provider: session

audit:
  trace_path: ../../runs/latest/trace.jsonl
  receipt_path: ../../runs/latest/governance_receipt.md
