name: react_enterprise_qa_v2_deepseek
purpose: "Answer enterprise knowledge questions through a governed ReAct workflow with Intent Resolution and DeepSeek-backed planning and review."

workflow:
  runtime: langgraph
  template: react_enterprise_qa_v2
  template_descriptor_version: react_enterprise_qa.v2
  checkpointer:
    provider: sqlite
    uri: memory

package_knowledge_sources:
  - source_id: react_enterprise_qa_v2_knowledge
    name: ReAct Enterprise QA V2 Knowledge
    provider: local_markdown
    params:
      path: ./knowledge

knowledge_bindings:
  - binding_id: react_enterprise_qa_v2_knowledge_binding
    source_ref:
      scope: package
      source_id: react_enterprise_qa_v2_knowledge

retrieval:
  strategy: single_step
  top_k: 2
  min_score: 0.2

react:
  max_steps: 5
  max_tool_calls: 1
  record_reasoning_summary: true
  planner:
    provider: deepseek
    name: deepseek-v4-flash
    params:
      api_key_env: DEEPSEEK_API_KEY
      temperature: 0
      max_output_tokens: 800
      timeout_seconds: 20

review:
  mode: auto
  subagent:
    provider: deepseek
    name: deepseek-v4-flash
    fail_closed: true
    params:
      api_key_env: DEEPSEEK_API_KEY
      temperature: 0
      timeout_seconds: 10
      max_output_tokens: 500

response:
  include_reasoning_summary: false
  include_review_results: false

model:
  provider: deepseek
  name: deepseek-v4-flash
  params:
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0
    max_output_tokens: 800
    timeout_seconds: 20

policy:
  file: ./policy.yaml

capabilities:
  tools:
    enabled: true
    file: ./tools.yaml
  memory:
    enabled: true
    provider: session

audit:
  trace_path: ../../runs/latest/trace.jsonl
  receipt_path: ../../runs/latest/governance_receipt.md
