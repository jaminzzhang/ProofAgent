rules:
  - rule_id: answering.require_retrieval
    enforcement_point: before_answer
    condition:
      require_retrieval: true
      min_evidence_count: 1
      require_citations: true
    decision:
      on_pass: allow
      on_fail: deny
    reason_template: "Answers require accepted evidence and citations."

  - rule_id: tools.customer_lookup.approval
    enforcement_point: before_tool_call
    condition:
      tool_name: customer_lookup
      risk_level: medium
    decision:
      on_match: require_approval
    reason_template: "Customer policy lookup requires explicit approval."

  - rule_id: memory.deny_sensitive_fields
    enforcement_point: before_memory_write
    condition:
      deny_fields:
        - access_token
        - customer_phone
        - provider_api_key
    decision:
      on_match: deny
      on_pass: allow
    reason_template: "Session memory must not store sensitive fields."
