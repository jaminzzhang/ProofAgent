services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: proof
      POSTGRES_USER: proof
      POSTGRES_PASSWORD: proof-test-only
    ports:
      - "127.0.0.1:${HYBRID_TEST_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proof -d proof"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: proof
      MINIO_ROOT_PASSWORD: proof-test-secret
    ports:
      - "127.0.0.1:${HYBRID_TEST_S3_PORT:-59000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: "no"

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: http://proof:proof-test-secret@minio:9000
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc mb --ignore-existing local/proof-agent-test
        mc version enable local/proof-agent-test
    restart: "no"

  opensearch:
    image: opensearchproject/opensearch:3.1.0
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:${HYBRID_TEST_OPENSEARCH_PORT:-19200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:9200/_cluster/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: "no"
