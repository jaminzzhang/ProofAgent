[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "proof-agent"
version = "0.1.0"
description = "Local-first Controlled Agent Harness Framework"
requires-python = ">=3.12"
dependencies = [
  "typer>=0.12.0",
  "pydantic>=2.7.0",
  "pyyaml>=6.0.1",
  "jinja2>=3.1.0",
  "langgraph>=1.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "ruff>=0.5.0", "mypy>=1.10.0"]
rag = ["sentence-transformers>=3.0.0", "chromadb>=0.5.0"]
mcp = ["mcp[cli]>=1.27.0"]

[project.scripts]
proof-agent = "proof_agent.cli:main"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
