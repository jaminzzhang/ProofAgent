schema_version: business_flow_skill_pack.v1
id: claims_consultation
label: Claims Consultation
description: "解答理赔流程、材料、责任认定说明、免赔、等待期和待决案件通用话术。"
intent_patterns:
  - 理赔
  - 赔案
  - 理赔材料
  - 待决
  - 拒赔
  - 免赔
  - 理赔进度
admission:
  min_confidence: 0.68
  require_authorization_context: false
knowledge_binding_refs:
  - claims_sop_docs
  - product_clause_docs
policy_rule_refs:
  - answering.require_evidence
  - response.no_coverage_or_payment_guarantee
stage_prompt_addenda:
  plan:
    business_context: "该业务流处理理赔知识咨询。流程、材料和通用话术只使用已绑定知识来源。"
    task_instructions:
      - "如果用户询问具体赔案进度或待决原因，说明当前Agent不读取业务系统记录。"
      - "如果缺少赔案标识，仍可先回答通用理赔流程或材料要求。"
  retrieval_review:
    business_context: "理赔流程、材料和条款责任说明优先检索 SOP 和条款；当前状态不能只靠文档回答。"
  model_answer:
    output_preferences:
      - "区分流程解释、条款依据和无法由当前知识咨询确认的赔案状态。"
      - "待决或拒赔相关话术应保守表达，不承诺赔付结果或时限。"
