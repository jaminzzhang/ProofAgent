name: agent_management_insurance_specialist
purpose: "为保险公司内勤专员提供受控的业务咨询、条款解释、核保问题支持、理赔问题支持，以及客户或代理人问题答复建议。"

workflow:
  # Transitional compatibility fields. Task 6B removes runtime and react.max_steps
  # from the public schema after every active package is V3-only.
  runtime: controlled_react
  template: react_enterprise_qa_v3
  template_descriptor_version: react_enterprise_qa.v3

package_knowledge_sources:
  - source_id: general_insurance_knowledge
    name: General Insurance Knowledge
    provider: local_markdown
    params:
      path: ./knowledge/general
  - source_id: agent_basic_law_knowledge
    name: Agent Basic Law Knowledge
    provider: local_markdown
    params:
      path: ./knowledge/agent-basic-law
  - source_id: product_clause_knowledge
    name: Product Clause Knowledge
    provider: local_markdown
    params:
      path: ./knowledge/product
  - source_id: underwriting_knowledge
    name: Underwriting Knowledge
    provider: local_markdown
    params:
      path: ./knowledge/underwriting
  - source_id: claims_knowledge
    name: Claims Knowledge
    provider: local_markdown
    params:
      path: ./knowledge/claims
  - source_id: external_wording_knowledge
    name: External Wording Knowledge
    provider: local_markdown
    params:
      path: ./knowledge/external-wording
  - source_id: metric_definition_knowledge
    name: Metric Definition Knowledge
    provider: local_markdown
    params:
      path: ./knowledge/metrics

knowledge_bindings:
  - binding_id: general_insurance_knowledge
    source_ref:
      scope: package
      source_id: general_insurance_knowledge
    alias: general_insurance
    failure_mode: advisory
    fusion_weight: 0.6
    top_k: 1
    routing_metadata:
      query_terms:
        - 通用保险
        - 一般保险
        - 保险帮助
        - general insurance
        - insurance help
  - binding_id: agent_basic_law_docs
    source_ref:
      scope: package
      source_id: agent_basic_law_knowledge
    alias: agent_basic_law
    failure_mode: required
    fusion_weight: 1.0
    top_k: 1
    routing_metadata:
      document_family: agent_basic_law
      authority: formal_rule
      query_terms:
        - 代理人基本法
        - 职级维持
        - 晋升条件
        - 佣金规则
        - agent basic law
        - rank maintenance
  - binding_id: product_clause_docs
    source_ref:
      scope: package
      source_id: product_clause_knowledge
    alias: product_clause
    failure_mode: required
    fusion_weight: 1.0
    top_k: 1
    routing_metadata:
      document_family: product_clause
      authority: policy_wording
      query_terms:
        - 产品条款
        - 等待期
        - 保障责任
        - 除外责任
        - product clause
        - waiting period
        - deductible
  - binding_id: underwriting_rule_docs
    source_ref:
      scope: package
      source_id: underwriting_knowledge
    alias: underwriting_rules
    failure_mode: required
    fusion_weight: 1.0
    top_k: 1
    routing_metadata:
      document_family: underwriting_rule
      authority: underwriting_sop
      query_terms:
        - 核保
        - 健康告知
        - 职业类别
        - 承保材料
        - underwriting
        - health declaration
  - binding_id: claims_sop_docs
    source_ref:
      scope: package
      source_id: claims_knowledge
    alias: claims_sop
    failure_mode: required
    fusion_weight: 1.0
    top_k: 1
    routing_metadata:
      document_family: claims_sop
      authority: claims_sop
      query_terms:
        - claim reimbursement
        - required documents
        - inpatient claim
        - 理赔
        - 住院理赔
        - 理赔材料
  - binding_id: customer_agent_wording_docs
    source_ref:
      scope: package
      source_id: external_wording_knowledge
    alias: external_wording
    failure_mode: advisory
    fusion_weight: 0.8
    top_k: 1
    routing_metadata:
      document_family: external_wording
      authority: approved_wording
      query_terms:
        - 外部话术
        - 如何回复客户
        - 怎么回复代理人
        - 客户或代理人
        - external wording
        - reply to customer
  - binding_id: metric_definition_docs
    source_ref:
      scope: package
      source_id: metric_definition_knowledge
    alias: metric_definitions
    failure_mode: required
    fusion_weight: 1.0
    top_k: 1
    routing_metadata:
      document_family: metric_definition
      authority: report_basis
      query_terms:
        - 业绩指标
        - 活动量
        - 指标口径
        - report period
        - performance metric

retrieval:
  strategy: single_step
  top_k: 1
  min_score: 0.25
  max_queries: 3
  query_timeout_seconds: 20.0

react:
  max_steps: 4
  max_plan_rounds: 4
  max_tool_calls: 0
  record_reasoning_summary: true
  planner:
    provider: deterministic
    name: agent-management-insurance-planner

review:
  mode: auto
  low_risk_fast_path: true
  subagent:
    provider: deterministic
    name: agent-management-insurance-reviewer
    fail_closed: true
    params:
      timeout_seconds: 10

response:
  include_reasoning_summary: true
  include_review_results: true

model:
  provider: deterministic
  name: agent-management-insurance-answer

policy:
  file: ./policy.yaml

capabilities:
  tools:
    enabled: false
  memory:
    enabled: true
    provider: session
  skills:
    enabled: true
    business_flows:
      - id: general_insurance_specialist
        definition: ./skills/general_insurance_specialist.yaml
        default: true
      - id: agent_basic_law_consultation
        definition: ./skills/agent_basic_law_consultation.yaml
      - id: product_clause_consultation
        definition: ./skills/product_clause_consultation.yaml
      - id: underwriting_consultation
        definition: ./skills/underwriting_consultation.yaml
      - id: claims_consultation
        definition: ./skills/claims_consultation.yaml
      - id: customer_agent_question_support
        definition: ./skills/customer_agent_question_support.yaml

audit:
  trace_path: ../../runs/latest/trace.jsonl
  receipt_path: ../../runs/latest/governance_receipt.md
