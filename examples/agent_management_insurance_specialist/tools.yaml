tools:
  - name: agent_performance_lookup
    description: "Read-only lookup for managed-agent performance metrics."
    transport: local
    handler: ./tools.py:agent_performance_lookup
    risk_level: medium
    requires_approval: false
    read_only: true
    allowed_parameters:
      - institution_id
      - branch_id
      - team_id
      - agent_id
      - business_line
      - report_period
      - metric
      - aggregation_level
    denied_parameters:
      - access_token
      - staff_password
      - provider_api_key
      - write_action
      - sql
      - export_all
      - agent_phone
