tools:
  - name: customer_lookup
    description: "Mock customer policy status lookup."
    transport: stdio
    handler: ../demo_tools.py:customer_lookup
    command: python
    args:
      - -m
      - examples.demo_tools
    risk_level: medium
    requires_approval: true
    allowed_parameters:
      - customer_id
      - policy_id
    denied_parameters:
      - access_token
      - customer_phone
      - provider_api_key
