name: insurance_customer_service
purpose: "Provide read-only customer service for insurance policy and claim questions when evidence or authorized account data supports the answer."

workflow:
  runtime: langgraph
  template: react_enterprise_qa
  checkpointer:
    provider: sqlite
    uri: memory

package_knowledge_sources:
  - source_id: insurance_customer_knowledge
    name: Insurance Customer Knowledge
    provider: local_markdown
    params:
      path: ./knowledge

knowledge_bindings:
  - binding_id: insurance_customer_knowledge_binding
    source_ref:
      scope: package
      source_id: insurance_customer_knowledge

retrieval:
  strategy: single_step
  top_k: 2
  min_score: 0.2

react:
  max_steps: 5
  max_tool_calls: 1
  record_reasoning_summary: true
  planner:
    provider: deterministic
    name: insurance-customer-planner-demo

review:
  mode: auto
  subagent:
    provider: deterministic
    name: insurance-customer-review-demo
    timeout_seconds: 5
    max_output_tokens: 500
    fail_closed: true

response:
  include_reasoning_summary: false
  include_review_results: false

model:
  provider: deterministic
  name: insurance-customer-demo

policy:
  file: ./policy.yaml

tools:
  file: ./tools.yaml

customer:
  adapter: ./customer_adapter.py

memory:
  provider: local
  scopes:
    case:
      enabled: true
      retention_days: 30
      max_records: 5
      allow_restricted: false
    user:
      enabled: false
    shared:
      enabled: false

audit:
  trace_path: ../../runs/latest/trace.jsonl
  receipt_path: ../../runs/latest/governance_receipt.md
