name: insurance_customer_service
purpose: "Provide read-only customer service for insurance policy and claim questions when evidence or authorized account data supports the answer."

workflow:
  runtime: langgraph
  template: react_enterprise_qa_v2
  template_descriptor_version: react_enterprise_qa.v2
  checkpointer:
    provider: sqlite
    uri: memory
  stages:
    - id: intent_resolution
      prompt:
        business_context: "Insurance customer service intent resolution: classify whether the customer is asking for public policy knowledge, account-scoped read-only status, disambiguation, or unsupported account changes."
        task_instructions:
          - "Preserve customer authentication and resource ownership boundaries before any account-scoped answer."
          - "Distinguish public insurance service guidance from policy or claim status lookups."
          - "Treat cancellation, claim outcome guarantees, or account-changing requests as unsupported for this customer-facing Agent."
        output_preferences:
          - "Keep intent summaries trace-safe and customer-safe."
      context:
        include_agent_purpose: true
        include_recent_conversation_summary: true
        include_bound_knowledge_sources: true
        include_bound_tools: true
        include_policy_outline: true
    - id: plan
      prompt:
        business_context: "Plan customer-safe insurance service assistance through governed retrieval, clarification, or authorized read-only status tools."
        task_instructions:
          - "Prefer governed retrieval for public policy, document, and process questions."
          - "Ask for clarification when the customer has multiple matching resources or lacks a stable policy or claim identifier."
          - "Only propose read tools for account-scoped status questions that can be authorized by customer context."
        output_preferences:
          - "Do not expose internal routing or review details to the customer."
      context:
        include_agent_purpose: true
        include_recent_conversation_summary: true
        include_bound_knowledge_sources: true
        include_bound_tools: true
        include_policy_outline: true
    - id: clarification
      context:
        include_agent_purpose: true
        include_recent_conversation_summary: true
        include_missing_field_schema: true
    - id: retrieval_review
      prompt:
        business_context: "Retrieval review admits customer-safe policy, product, claim-submission, and service-process knowledge before answer generation."
        task_instructions:
          - "Use knowledge for public rules, document requirements, coverage terms, and service process guidance."
          - "Do not treat public knowledge as proof of a customer's current policy or claim status."
        output_preferences:
          - "Keep review rationale compact and audit-safe."
      context:
        include_agent_purpose: true
        include_retrieval_intent: true
        include_bound_knowledge_sources: true
        include_policy_outline: true
    - id: model_answer
      prompt:
        business_context: "Customer-facing answers must follow Customer-Safe Response Projection and rely on accepted evidence or authorized read-only tool results."
        task_instructions:
          - "Separate generic policy guidance from customer-specific status facts."
          - "Avoid claim outcome guarantees, legal advice, or account-changing commitments."
          - "Use customer-safe source labels rather than internal tool or source identifiers."
        output_preferences:
          - "Use concise service language with clear next steps when evidence supports them."
      context:
        include_agent_purpose: true
        include_recent_conversation_summary: true
        include_evidence_summary: true
        include_citation_requirements: true
        include_response_disclosure_policy: true
    - id: tool_review
      prompt:
        business_context: "Tool review permits only customer-authorized read-only policy or claim status lookup proposals."
        task_instructions:
          - "Require customer ownership and stable resource identifiers before allowing a lookup."
          - "Reject cross-customer access, account changes, cancellation, or claim outcome manipulation."
          - "Prefer clarification over guessing when resource identity is ambiguous."
        output_preferences:
          - "Keep permission-check reasoning trace-safe and non-customer-visible."
      context:
        include_agent_purpose: true
        include_tool_proposal: true
        include_tool_contract_summary: true
        include_policy_outline: true
        include_approval_requirements: true
    - id: response
      context:
        include_agent_purpose: true
        include_outcome: true
        include_response_disclosure_policy: true

package_knowledge_sources:
  - source_id: insurance_customer_knowledge
    name: Insurance Customer Knowledge
    provider: local_markdown
    params:
      path: ./knowledge

knowledge_bindings:
  - binding_id: insurance_customer_knowledge_binding
    source_ref:
      scope: package
      source_id: insurance_customer_knowledge

retrieval:
  strategy: single_step
  top_k: 2
  min_score: 0.2

react:
  max_steps: 5
  max_tool_calls: 1
  record_reasoning_summary: true
  planner:
    provider: deterministic
    name: insurance-customer-planner-demo

review:
  mode: auto
  subagent:
    provider: deterministic
    name: insurance-customer-review-demo
    fail_closed: true
    params:
      timeout_seconds: 5
      max_output_tokens: 500

response:
  include_reasoning_summary: false
  include_review_results: false

model:
  provider: deterministic
  name: insurance-customer-demo

policy:
  file: ./policy.yaml

customer:
  adapter: ./customer_adapter.py

capabilities:
  tools:
    enabled: true
    file: ./tools.yaml
  memory:
    enabled: true
    provider: local
    scopes:
      case:
        enabled: true
        retention_days: 30
        max_records: 5
        allow_restricted: false
      user:
        enabled: false
      shared:
        enabled: false

audit:
  trace_path: ../../runs/latest/trace.jsonl
  receipt_path: ../../runs/latest/governance_receipt.md
