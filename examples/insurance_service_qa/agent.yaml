name: insurance_service_qa
purpose: "Assist service staff with insurance policy and claim questions only when evidence supports the answer."

workflow:
  runtime: langgraph
  template: enterprise_qa
  checkpointer:
    provider: sqlite
    uri: memory

knowledge:
  provider: local_markdown
  params:
    path: ./knowledge

retrieval:
  strategy: single_step
  top_k: 2
  min_score: 0.2

model:
  provider: deterministic
  name: insurance-demo

policy:
  file: ./policy.yaml

tools:
  file: ./tools.yaml

memory:
  provider: session

audit:
  trace_path: ../../runs/latest/trace.jsonl
  receipt_path: ../../runs/latest/governance_receipt.md
