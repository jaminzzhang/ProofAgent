tools:
  - name: institution_report_lookup
    description: "Read-only institution report metric lookup for authorized staff scope."
    transport: local
    handler: ./tools.py:institution_report_lookup
    risk_level: medium
    requires_approval: false
    read_only: true
    allowed_parameters:
      - institution_id
      - branch_id
      - business_line
      - report_period
      - metric
    denied_parameters:
      - access_token
      - staff_password
      - provider_api_key
      - write_action
